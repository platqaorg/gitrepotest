swagger: '2.0'
info:
  version: '1.0.0'
  title: Reqres API Example
  description: This API demonstrates Swagger with real, executable endpoints using reqres.in.
host: reqres.in
basePath: /api
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /users:
    get:
      summary: Get user list
      responses:
        '200':
          description: List of users
    post:
      summary: Create user
      parameters:
        - in: body
          name: user
          required: true
          schema:
            type: object
            required:
              - name
              - job
            properties:
              name:
                type: string
              job:
                type: string
      responses:
        '201':
          description: User created
  /users/2:
    get:
      summary: Get single user
      responses:
        '200':
          description: User found
        '404':
          description: User not found
